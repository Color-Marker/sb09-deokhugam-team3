# 1. 안전한 가짜 DB (메모리용 H2) 설정
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# 2. 로봇이 찾다가 기절했던 '기본값 없는 변수'들의 가짜 값 세팅
naver:
  api:
    client-id: test-naver-client-id
    client-secret: test-naver-client-secret
    book-search-url: https://openapi.naver.com/v1/search/book.json

ocr:
  api:
    key: test-ocr-api-key
    url: https://api.ocr.space/parse/image

# 3. 로컬 스토리지 테스트 시 경로 에러 방지용
deokhugam:
  storage:
    type: local
    local:
      root-path: ./build/test-storage
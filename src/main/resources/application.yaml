server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: deokhugam
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:30MB}
  jpa:
    open-in-view: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  batch:
    jdbc:
      initialize-schema: never # schema.sql 로 같이 생성
    job:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,loggers
  endpoint:
    health:
      show-details: always

deokhugam:
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      root-path: ../storage
    s3:
      access-key: ${AWS_S3_ACCESS_KEY:}
      secret-key: ${AWS_S3_SECRET_KEY:}
      region: ${AWS_S3_REGION:ap-northeast-2}
      bucket: ${AWS_S3_BUCKET:}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:PT10M}

logging:
  file:
    path: ${LOG_PATH:./.logs}
  level:
    root: info
name: 1. CI (Test and Coverage Badge)

on:
  pull_request:
    branches: [ "main", "dev" ]
    # 👇 paths-ignore는 각 이벤트(pull_request, push) 바로 아래에 있어야 합니다.
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'scripts/**'
  push:
    branches: [ "dev", "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'scripts/**'
  workflow_dispatch: # 수동 리모컨은 보통 ignore를 넣지 않습니다.

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OCR_API_KEY: ${{ secrets.OCR_API_KEY }}
      SPRING_PROFILES_ACTIVE: ${{ secrets.SPRING_PROFILES_ACTIVE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. 테스트 실행 및 리포트 생성 (수정됨!)
      # jacocoTestReport를 명시적으로 실행해야 CSV 파일이 확실하게 생성됩니다.
      - name: Run Tests and Generate Jacoco Report
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Generate Jacoco Badge
        id: jacoco
        uses: cicirello/jacoco-badge-generator@v2
        with:
          generate-branches-badge: true
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv

      - name: Commit and push badge
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          # 배지가 저장될 폴더를 미리 생성합니다.
          mkdir -p .github/badges
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .github/badges/jacoco.svg
          # 변경사항이 있을 때만 커밋합니다.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Updated coverage badge" && git push)
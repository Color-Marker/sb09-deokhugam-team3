name: 1. CI (Test and Codecov)

on:
  pull_request:
    branches: [ "main", "dev" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'scripts/**'
  push:
    branches: [ "dev", "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    # 이제 레포지토리에 직접 '쓰기'를 하지 않으므로 permissions 설정이 더 안전해집니다.
    permissions:
      contents: read

    env:
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      OCR_API_KEY: ${{ secrets.OCR_API_KEY }}
      SPRING_PROFILES_ACTIVE: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # [중요] 테스트를 돌리고 JaCoCo 리포트를 생성합니다.
      - name: Run Tests and Generate Jacoco Report
        run: ./gradlew test jacocoTestReport --no-daemon

      # 👇 여기가 팀원분이 말씀하신 코드가 들어갈 자리입니다!
      # 기존의 'Generate Jacoco Badge'와 'Commit and push' 단계를 이 코드가 대체합니다.
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Jacoco 리포트 파일 경로를 명시해주면 더 정확하게 업로드됩니다.
          files: build/reports/jacoco/test/jacocoTestReport.xml
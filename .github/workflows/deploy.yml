name: 2. CD (Deploy to Public ECR)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. AWS 자격 증명 설정 (ECR Public용)
      - name: Configure AWS credentials for Public ECR Login
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      # 2. Public ECR 로그인
      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v1
        with:
          registry-type: public

      # 3. Docker 이미지 빌드 및 푸시
      - name: Build, tag, and push docker image to Amazon ECR Public
        run: |
          docker build -t ${{ vars.ECR_REPOSITORY_URI }}:${{ github.sha }} .
          docker push ${{ vars.ECR_REPOSITORY_URI }}:${{ github.sha }}

      # 4. AWS 자격 증명 재설정 (ECS 배포용 - 서울 리전)
      - name: Configure AWS credentials for ECS Deployment
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      # 5. 새 태스크 정의 등록 및 롤링 배포
      # 서비스를 끄지 않고 새 이미지로 태스크를 순차 교체 (무중단)
      - name: Update ECS Service with Rolling Deploy
        run: |
          # 현재 태스크 정의 조회
          TASK_DEFINITION=$(aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_DEFINITION }})
          
          # 새 이미지로 태스크 정의 업데이트
          NEW_TASK_DEF=$(echo $TASK_DEFINITION | jq \
            --arg IMAGE "${{ vars.ECR_REPOSITORY_URI }}:${{ github.sha }}" \
            '.taskDefinition 
              | .containerDefinitions[0].image = $IMAGE 
              | del(.taskDefinitionArn) 
              | del(.revision) 
              | del(.status) 
              | del(.requiresAttributes) 
              | del(.compatibilities) 
              | del(.registeredAt) 
              | del(.registeredBy)')
          
          # 새 태스크 정의 등록
          NEW_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          
          # 서비스 업데이트 (desired-count 유지, 롤링 배포)
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --task-definition $NEW_TASK_ARN \
            --force-new-deployment

      # 6. 배포 완료까지 대기 (헬스체크 통과 확인)
      # 새 태스크가 정상 상태가 될 때까지 기다림 (최대 10분)
      - name: Wait for deployment to complete
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }}

      # 배포 결과 알림 (Discord)
      - name: 배포 성공 알림
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "✅ 무중단 롤링 배포 완료"
          description: "새 버전이 성공적으로 배포되었습니다."
          color: 0x00ff00

      - name: 배포 실패 알림
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🚨 배포 실패"
          description: "배포 중 에러가 발생했습니다. 로그를 확인해주세요."
          color: 0xff0000
name: 2. CD (Deploy to Public ECR)

on:
  push:
    branches: [ "main", "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. Public ECR 인증을 위해 임시로 미국 리전(us-east-1) 사용
      - name: Configure AWS credentials for Public ECR Login
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      # 2. Public ECR 로그인 (이 스텝은 반드시 us-east-1 권한이 필요합니다)
      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v1
        with:
          registry-type: public

      # 3. Docker 이미지 빌드 및 푸시
      - name: Build, tag, and push image to Amazon ECR Public
        env:
          # ⚠️ 변수 설정 주의: ECR_REPOSITORY_URI는 public.ecr.aws/xxx/repo 형식을 다 넣어주세요.
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REPOSITORY:latest .
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest

      # 4. 이제 배포를 위해 다시 서울 리전으로 자격 증명 재설정
      - name: Configure AWS credentials for Seoul
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }} # ap-northeast-2

      # 5. [프리티어 필수] 메모리 확보를 위해 기존 서비스 중단
      - name: Stop current service (Desired Count 0)
        run: |
          aws ecs update-service --cluster ${{ vars.ECS_CLUSTER }} --service ${{ vars.ECS_SERVICE }} --desired-count 0

      # 6. 새 태스크 정의 등록 및 서비스 업데이트
      - name: Update ECS Service
        run: |
          TASK_DEFINITION=$(aws ecs describe-task-definition --task-definition ${{ vars.ECS_TASK_DEFINITION }})
          NEW_TASK_DEF=$(echo $TASK_DEFINITION | jq --arg IMAGE "${{ vars.ECR_REPOSITORY_URI }}:${{ github.sha }}" '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn) | del(.revision) | del(.status) | del(.requiresAttributes) | del(.compatibilities) | del(.registeredAt) | del(.registeredBy)')
          
          aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF"
          
          aws ecs update-service --cluster ${{ vars.ECS_CLUSTER }} --service ${{ vars.ECS_SERVICE }} --task-definition ${{ vars.ECS_TASK_DEFINITION }} --desired-count 1 --force-new-deployment

      # 배포 성공 시 알림
      - name: 배포 성공 알림
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "✅ 서버 배포 완료"
          description: "배포가 성공적으로 완료되었습니다."
          color: 0x00ff00

      # 배포 실패 시 알림
      - name: 배포 실패 알림
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "❌ 서버 배포 실패"
          description: "배포 중 오류가 발생했습니다."
          color: 0xff0000